<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Title (VERY important for SEO) -->
    <title>V2V Student Transport & Accommodation | Safe, Reliable Student Services</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="V2V provides safe, reliable student transport and accommodation services. Trusted solutions for students, parents, and institutions."
    />

    <!-- Keywords (low weight but still acceptable) -->
    <meta
      name="keywords"
      content="student transport, student accommodation, school transport, university housing, V2V students"
    />

    <!-- Author -->
    <meta name="author" content="V2V" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.v2v.com/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="V2V Student Transport & Accommodation" />
    <meta
      property="og:description"
      content="Safe and reliable student transport and accommodation services by V2V."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.v2v.com/" />
    <meta property="og:image" content="https://www.v2v.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="V2V Student Transport & Accommodation" />
    <meta
      name="twitter:description"
      content="Trusted student transport and accommodation services."
    />
    <meta name="twitter:image" content="https://www.v2v.com/og-image.jpg" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
